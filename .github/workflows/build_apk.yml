name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Check Flutter
      run: |
        flutter doctor -v
        flutter --version
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: |
        flutter build apk --release \
          --target-platform android-arm64,android-arm \
          --split-per-abi \
          --verbose
      continue-on-error: true
    
    - name: Check build output
      run: |
        ls -la build/app/outputs/flutter-apk/ || echo "Build output directory not found"
        find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
    
    - name: Rename APK files
      if: success()
      run: |
        mkdir -p dist
        cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/爱家影视-arm64.apk || echo "ARM64 APK not found"
        cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/爱家影视-armv7a.apk || echo "ARMv7a APK not found"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: 爱家影视-APK
        path: dist/*.apk
        if-no-files-found: warn
