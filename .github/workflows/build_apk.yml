name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    
    - name: Check versions
      run: |
        flutter --version
        dart --version
    
    - name: Create local.properties
      run: |
        echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
        cat android/local.properties
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK with verbose output
      run: |
        echo "=== Starting Flutter build ==="
        flutter build apk --debug --verbose 2>&1 | tee build_output.txt
        echo "=== Build process finished ==="
      shell: bash
    
    - name: Show error if build failed
      if: failure()
      run: |
        echo "=== BUILD FAILED - Last 200 lines ==="
        tail -n 200 build_output.txt
      shell: bash
    
    - name: Prepare artifacts
      run: |
        mkdir -p dist
        cp build/app/outputs/flutter-apk/app-debug.apk dist/爱家影视.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 爱家影视-APK
        path: dist/*.apk
